syntax = "proto3";

package books.v1;

service BooksService {
  rpc SearchBooksAndAuthors(SearchRequest) returns (SearchResponse);
  rpc GetBook(GetBookRequest) returns (BookDetailResponse);
  rpc GetAuthor(GetAuthorRequest) returns (AuthorDetailResponse);
  rpc GetAuthorBooks(GetAuthorBooksRequest) returns (BooksListResponse);
  rpc GetSeries(GetSeriesRequest) returns (SeriesDetailResponse);
  rpc GetSeriesBooks(GetSeriesBooksRequest) returns (BooksListResponse);
  rpc UpdateBook(UpdateBookRequest) returns (BookDetailResponse);
  rpc UpdateAuthor(UpdateAuthorRequest) returns (AuthorDetailResponse);
  rpc UpdateSeries(UpdateSeriesRequest) returns (SeriesDetailResponse);
  rpc OpenCase(OpenCaseRequest) returns (OpenCaseResponse);
  rpc DiscoverBook(DiscoverBookRequest) returns (DiscoverBookResponse);
}

message SearchRequest {
  string query = 1;
  int32 limit = 2;
  int32 offset = 3;
  string type_filter = 4;
  string language = 5;
}

message SearchResult {
  string type = 1;
  int64 id = 2;
  string title = 3;
  string slug = 4;
  string cover_url = 5;
  repeated string authors = 6;
  float relevance_score = 7;
  int32 view_count = 8;
  repeated string author_slugs = 9;
  string series_slug = 10;
  string avg_rating = 11;
  int32 rating_count = 12;
  int32 book_count = 13;
}

message SearchResponse {
  repeated SearchResult results = 1;
  int32 total_count = 2;
}

message GetBookRequest {
  string slug = 1;
  string language = 2;
}

message SubRatingStat {
  string avg = 1;
  int32 count = 2;
}

message BookDetail {
  int64 book_id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string language = 5;
  int32 original_publication_year = 6;
  repeated string formats = 7;
  string primary_cover_url = 8;
  repeated CoverHistory cover_history = 9;
  int32 rating_count = 10;
  string avg_rating = 11;
  int32 view_count = 12;
  string last_viewed_at = 13;
  repeated AuthorInfo authors = 14;
  repeated GenreInfo genres = 15;
  string open_library_id = 16;
  string google_books_id = 17;
  string created_at = 18;
  string updated_at = 19;
  SeriesInfo series = 20;
  string series_position = 21;
  map<string, SubRatingStat> sub_rating_stats = 22;
  repeated string isbn = 23;
  string publisher = 24;
  int32 number_of_pages = 25;
  map<string, string> external_ids = 26;
  int32 ol_rating_count = 27;
  string ol_avg_rating = 28;
  int32 ol_want_to_read_count = 29;
  int32 ol_currently_reading_count = 30;
  int32 ol_already_read_count = 31;
  string first_sentence = 32;
  int32 app_want_to_read_count = 33;
  int32 app_reading_count = 34;
  int32 app_read_count = 35;
}

message CoverHistory {
  string url = 1;
  int32 width = 2;
  string size = 3;
}

message AuthorInfo {
  int64 author_id = 1;
  string name = 2;
  string slug = 3;
  string photo_url = 4;
}

message GenreInfo {
  int64 genre_id = 1;
  string name = 2;
  string slug = 3;
}

message SeriesInfo {
  int64 series_id = 1;
  string name = 2;
  string slug = 3;
  int32 total_books = 4;
}

message BookDetailResponse {
  BookDetail book = 1;
}

message GetAuthorRequest {
  string slug = 1;
  string language = 2;
}

message AuthorDetail {
  int64 author_id = 1;
  string name = 2;
  string slug = 3;
  string bio = 4;
  string birth_date = 5;
  string death_date = 6;
  string photo_url = 7;
  int32 view_count = 8;
  string last_viewed_at = 9;
  int32 books_count = 10;
  string open_library_id = 11;
  string created_at = 12;
  string updated_at = 13;
  string birth_place = 14;
  string nationality = 15;
  repeated string book_categories = 16;
  string books_avg_rating = 17;
  int32 books_total_ratings = 18;
  string wikidata_id = 20;
  string wikipedia_url = 21;
  map<string, string> remote_ids = 22;
  repeated string alternate_names = 23;
  string books_ol_avg_rating = 24;
  int32 books_ol_total_ratings = 25;
  int32 app_want_to_read_count = 26;
  int32 app_reading_count = 27;
  int32 app_read_count = 28;
  int32 ol_want_to_read_count = 29;
  int32 ol_currently_reading_count = 30;
  int32 ol_already_read_count = 31;
}

message AuthorDetailResponse {
  AuthorDetail author = 1;
}

message GetAuthorBooksRequest {
  string author_slug = 1;
  int32 limit = 2;
  int32 offset = 3;
  string sort_by = 4;
  string order = 5;
  string language = 6;
}

message BookSummary {
  int64 book_id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string primary_cover_url = 5;
  repeated AuthorInfo authors = 6;
  int32 rating_count = 7;
  string avg_rating = 8;
  int32 ol_rating_count = 9;
  string ol_avg_rating = 10;
  int32 ol_want_to_read_count = 11;
  int32 ol_currently_reading_count = 12;
  int32 ol_already_read_count = 13;
  int32 app_want_to_read_count = 14;
  int32 app_reading_count = 15;
  int32 app_read_count = 16;
  string series_position = 17;
  string rarity = 18;
}

message BooksListResponse {
  repeated BookSummary books = 1;
  int32 total_count = 2;
}

message GetSeriesRequest {
  string slug = 1;
  string language = 2;
}

message SeriesDetail {
  int64 series_id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  int32 total_books = 5;
  int32 view_count = 6;
  string last_viewed_at = 7;
  string created_at = 8;
  string updated_at = 9;
  string avg_rating = 10;
  int32 rating_count = 11;
  string ol_avg_rating = 12;
  int32 ol_rating_count = 13;
  int32 app_want_to_read_count = 15;
  int32 app_reading_count = 16;
  int32 app_read_count = 17;
  int32 ol_want_to_read_count = 18;
  int32 ol_currently_reading_count = 19;
  int32 ol_already_read_count = 20;
}

message SeriesDetailResponse {
  SeriesDetail series = 1;
}

message GetSeriesBooksRequest {
  string series_slug = 1;
  int32 limit = 2;
  int32 offset = 3;
  string language = 4;
  string sort_by = 5;
  string order = 6;
}

// Admin update requests — only fields included in the proto3 optional set are applied.
// Presence is detected via HasField() in the gRPC server.

message UpdateBookRequest {
  int64 book_id = 1;
  optional string title = 2;
  optional string slug = 3;
  optional string description = 4;
  optional string first_sentence = 5;
  optional string language = 6;
  optional int32 original_publication_year = 7;
  optional string primary_cover_url = 8;
  optional string formats_json = 9;
  optional string cover_history_json = 10;
  optional string isbn_json = 11;
  optional string publisher = 12;
  optional int32 number_of_pages = 13;
  optional string external_ids_json = 14;
  optional string open_library_id = 15;
  optional string google_books_id = 16;
  optional int64 series_id = 17;
  optional string series_position = 18;
}

message UpdateAuthorRequest {
  int64 author_id = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string bio = 4;
  optional string birth_date = 5;
  optional string death_date = 6;
  optional string birth_place = 7;
  optional string nationality = 8;
  optional string photo_url = 9;
  optional string wikidata_id = 10;
  optional string wikipedia_url = 11;
  optional string remote_ids_json = 12;
  optional string alternate_names_json = 13;
  optional string open_library_id = 14;
}

message UpdateSeriesRequest {
  int64 series_id = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string description = 4;
  optional int32 total_books = 5;
}

message OpenCaseRequest {
  string language = 1;
}

message OpenCaseResponse {
  repeated BookSummary display_list = 1;
  int32 winning_index = 2;
  BookSummary winner = 3;
  reserved 4;
  reserved "winner_detail";
}

message DiscoverBookRequest {
  string language = 1;
  repeated string genre_slugs = 2;
  string book_length = 3;
  string quality = 4;
  repeated string moods = 5;
  string era = 6;
  string series_filter = 7;
  string popularity = 8;
  repeated int64 exclude_ids = 9;
}

message DiscoverBookResponse {
  BookSummary book = 1;
  int32 matching_count = 2;
}
